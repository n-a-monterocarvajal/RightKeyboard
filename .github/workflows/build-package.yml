name: Compilación distribuible

# Compilación limpia en Release que produce una salida distribuible del proyecto.
# Dos modalidades (entrada "artifact"):
#   - installer (por defecto): instalador Inno Setup por usuario
#     (RightKeyboard-<versión>-Setup.exe) + SHA-256, vía scripts/build-installer.ps1.
#   - zip: ZIP portable autocontenido (RightKeyboard-<versión>-win-x64-portable.zip)
#     + SHA-256, vía scripts/build-portable-zip.ps1, para probar en una estación que
#     no es la de desarrollo sin instalar nada.
# No se ejecuta en cada commit ni pull request; solo manualmente o al empujar una
# etiqueta de versión (v*, siempre en modalidad installer). El resultado normal es un
# artefacto descargable con retención breve.
#
# Publicación (entrada "publish"=yes, solo con artifact=installer): un job aparte
# —con permiso contents: write acotado a ese job— crea una GitHub Release vX.Y.Z
# con el instalador y su SHA-256 desde Actions, usando el GITHUB_TOKEN del runner
# (sin tokens personales). Por defecto no publica.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a estampar (vacío = usar la del proyecto en RightKeyboard.csproj)'
        required: false
        default: ''
      artifact:
        description: 'Qué generar'
        required: false
        default: 'installer'
        type: choice
        options:
          - installer
          - zip
      publish:
        description: 'Publicar una GitHub Release (solo con artifact=installer)'
        required: false
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
  push:
    tags:
      - 'v*'

# Mínimo privilegio: solo lectura. El artefacto se publica con upload-artifact,
# que no requiere permisos de escritura sobre el repositorio.
permissions:
  contents: read

concurrency:
  group: build-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Compilación distribuible (Windows, x64, Release)
    runs-on: windows-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configurar .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      # Los runners de GitHub no traen Inno Setup preinstalado. Solo se instala para la
      # modalidad installer. build-installer.ps1 detecta ISCC.exe en las rutas estándar
      # de Program Files y en el shim de PATH de Chocolatey, así que no hace falta -IsccPath.
      - name: Instalar Inno Setup
        if: ${{ github.event.inputs.artifact != 'zip' }}
        run: choco install innosetup --no-progress -y

      - name: Determinar versión
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($version) -and '${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            [xml]$proj = Get-Content -LiteralPath 'RightKeyboard/RightKeyboard.csproj'
            $version = ([string]$proj.Project.PropertyGroup.Version).Trim()
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'No se pudo determinar la versión a compilar.'
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Versión de compilación: $version"

      # Modalidad installer: publica núcleo + WinUI autocontenidos (win-x64, ReadyToRun)
      # en una sola carpeta, compila el instalador Inno Setup y escribe el SHA-256.
      - name: Compilar instalador distribuible
        if: ${{ github.event.inputs.artifact != 'zip' }}
        shell: pwsh
        run: ./scripts/build-installer.ps1 -Version ${{ steps.version.outputs.version }}

      # Modalidad zip: misma publicación autocontenida, comprimida en un ZIP portable
      # (sin instalador) para pruebas rápidas.
      - name: Compilar ZIP portable autocontenido
        if: ${{ github.event.inputs.artifact == 'zip' }}
        shell: pwsh
        run: ./scripts/build-portable-zip.ps1 -Version ${{ steps.version.outputs.version }}

      # El nombre del artefacto identifica aplicación, versión, arquitectura y modalidad.
      - name: Publicar artefacto (instalador)
        if: ${{ github.event.inputs.artifact != 'zip' }}
        uses: actions/upload-artifact@v7
        with:
          name: RightKeyboard-${{ steps.version.outputs.version }}-win-x64-installer
          path: |
            artifacts/installer/RightKeyboard-*-Setup.exe
            artifacts/installer/RightKeyboard-*-SHA256.txt
          retention-days: 7
          if-no-files-found: error

      - name: Publicar artefacto (ZIP portable)
        if: ${{ github.event.inputs.artifact == 'zip' }}
        uses: actions/upload-artifact@v7
        with:
          name: RightKeyboard-${{ steps.version.outputs.version }}-win-x64-portable
          path: |
            artifacts/portable/RightKeyboard-*-portable.zip
            artifacts/portable/RightKeyboard-*-portable-SHA256.txt
          retention-days: 7
          if-no-files-found: error

  # Publica la GitHub Release solo cuando se pide explícitamente (publish=yes) en
  # modalidad installer. Job aparte para acotar contents: write a la publicación;
  # el job de compilación permanece de solo lectura. Corre en Ubuntu (gh preinstalado)
  # y reutiliza el instalador que subió el job anterior.
  publish:
    name: Publicar GitHub Release
    needs: package
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'yes' && github.event.inputs.artifact == 'installer' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Descargar el instalador compilado
        uses: actions/download-artifact@v8
        with:
          name: RightKeyboard-${{ needs.package.outputs.version }}-win-x64-installer
          path: dist

      # Crea el tag vX.Y.Z sobre el commit actual y la Release con los dos assets.
      # Las notas salen de la sección del CHANGELOG de esa versión más el resumen de
      # descargas y el SHA-256 real del instalador recién compilado.
      - name: Crear la GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version='${{ needs.package.outputs.version }}'
          setup=$(ls dist/RightKeyboard-*-Setup.exe)
          shafile=$(ls dist/RightKeyboard-*-SHA256.txt)
          sha=$(cut -d' ' -f1 "$shafile")

          {
            echo "## RightKeyboard $version"
            echo
            awk -v ver="$version" '
              index($0, "## [" ver "]") == 1 { flag=1; next }
              flag && index($0, "## [") == 1 { flag=0 }
              flag { print }
            ' CHANGELOG.md
            echo "### Descargas"
            echo
            echo "- \`$(basename "$setup")\`"
            echo "- \`$(basename "$shafile")\`"
            echo
            echo "SHA-256 del instalador: \`$sha\`"
          } > notes.md

          if gh release view "v$version" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "La Release v$version ya existe; no se recrea." >&2
            exit 1
          fi

          gh release create "v$version" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "RightKeyboard $version" \
            --notes-file notes.md \
            --latest \
            "$setup" "$shafile"
          echo "Release v$version publicada."
