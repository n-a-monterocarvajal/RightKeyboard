# Mantenimiento semanal de dependencias. Las actualizaciones se agrupan para
# reducir el número de pull requests y, con ello, de ejecuciones de CI. No hay
# administración centralizada de paquetes (no existe Directory.Packages.props):
# Dependabot resuelve los PackageReference de cada .csproj de la solución.
version: 2

updates:
  # Paquetes NuGet de los tres proyectos (núcleo, WinUI y pruebas).
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      nuget:
        patterns:
          - "*"

  # Acciones usadas por los workflows de .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
